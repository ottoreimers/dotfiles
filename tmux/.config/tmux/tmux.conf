unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."
set -g prefix C-a

set -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key S command-prompt -p "New Session:" "new-session -A -s '%%'"

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -s escape-time 0
set -g mouse on
set-option -g focus-events on

# Plugin Manager (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'binoymanoj/tmux-minimal-theme'

# Minimal Theme (Catppuccin Mocha colors)
set -g @minimal_theme_bg_color "#1e1e2e"
set -g @minimal_theme_active_color "#b4befe"
set -g @minimal_theme_inactive_color "#6c7086"
set -g @minimal_theme_text_color "#cdd6f4"
set -g @minimal_theme_accent_color "#b4befe"
set -g @minimal_theme_border_color "#45475a"

set-option -g status-position bottom

run '~/.config/tmux/plugins/tpm/tpm'
